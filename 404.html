<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA redirect: capture the path and redirect to index.html with path info
    var path = window.location.pathname;
    var search = window.location.search;
    var redirect = path + search;
    // Store the original path for the SPA router
    sessionStorage.setItem('spa-path', redirect);
    window.location.replace('/acg-api/' + '?spa=' + encodeURIComponent(redirect));
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
