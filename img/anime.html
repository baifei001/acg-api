<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting...</p>
  <script>
    fetch('/acg-api/data/images.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const images = data.categories && data.categories['anime'];
        if (!images || images.length === 0) {
          document.body.innerHTML = '<p>No image available</p>';
          return;
        }
        const randomImg = images[Math.floor(Math.random() * images.length)];
        const fullUrl = randomImg.url.startsWith('http') ? randomImg.url : 'https://baifei001.github.io/acg-api/' + randomImg.url;
        window.location.replace(fullUrl);
      })
      .catch(() => {
        document.body.innerHTML = '<p>Failed to load</p>';
      });
  </script>
</body>
</html>
