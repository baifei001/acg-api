name: Build Image Index

on:
  push:
    branches: [master]
    paths:
      - 'images/**'
      - 'data/external.json'
      - 'scripts/build.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build image index
        run: npm run build

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/images.json api/ img/ images/ _worker.js
          git diff --staged --quiet || git commit -m "chore: update image index"
          git push
